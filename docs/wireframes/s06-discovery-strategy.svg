x="46" y="332" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">    - "app/workers/handlers/*.py"</text><text x="34" y="348" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">7</text><text x="46" y="348" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">  routing:</text><text x="34" y="364" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">8</text><text x="46" y="364" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">    framework: fastapi</text><text x="34" y="380" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">9</text><text x="46" y="380" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">    decorators: ["@router.*", "@app.*"]</text><text x="34" y="396" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">10</text><text x="46" y="396" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">  exclude:</text><text x="34" y="412" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">11</text><text x="46" y="412" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="start">    - "app/api/internal/**"  # ops only</text><text x="34" y="428" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">12</text><text x="46" y="428" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">    - "app/api/health.py"</text><text x="34" y="444" font-size="8.5" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#a8a8a8" font-weight="400" text-anchor="end">13</text><text x="46" y="444" font-size="9" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" fill="#1a1a1a" font-weight="400" text-anchor="start">  naming: "verb_noun from path"</text><rect x="22" y="484" width="349" height="56" rx="10" fill="#f4f4f4" stroke="#e0e0e0" stroke-width="1"/><rect x="34" y="496" width="22" height="22" rx="5" fill="#d4d4d4" stroke="none" stroke-width="1"/><text x="66" y="506" font-size="10" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#1a1a1a" font-weight="400" text-anchor="start">Heads up · app/api/internal/는 운영용으로</text><text x="66" y="522" font-size="10" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#757575" font-weight="400" text-anchor="start">제외했어요. 포함하려면 편집하세요.</text><rect x="22" y="568" width="143.22" height="38" rx="9" fill="none" stroke="#bdbdbd" stroke-width="1"/><text x="93.61" y="591" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#1a1a1a" font-weight="500" text-anchor="middle">Regenerate</text><rect x="173.22" y="568" width="197.77999999999997" height="38" rx="9" fill="#d4d4d4" stroke="#bdbdbd" stroke-width="1"/><text x="272.11" y="591" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#1a1a1a" font-weight="500" text-anchor="middle">Approve &amp; Scan →</text><text x="22" y="800" font-size="9" fon