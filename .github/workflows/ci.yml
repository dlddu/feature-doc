name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: test + build + push
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Test backend (cargo test)
        run: cargo test --manifest-path backend/Cargo.toml --release

      - name: Install kind (arm64)
        run: |
          curl -fsSLo /tmp/kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-arm64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install kubectl (arm64)
        run: |
          KVER=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/arm64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: e2e (docker build → kind → smoke + playwright)
        env:
          IMAGE: featuredoc:dev
        run: bash scripts/e2e.sh

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        if: github.event_name == 'pull_request'
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Image metadata
        id: meta
        if: github.event_name == 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/featuredoc
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=raw,value=${{ github.event.pull_request.head.sha }}
            type=raw,value=latest

      - name: Build & push image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
