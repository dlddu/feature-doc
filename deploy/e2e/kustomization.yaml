apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# e2e overlay. The base (deploy/k8s) targets ghcr.io/dlddu/featuredoc:latest
# with an Always pull policy — correct for production. For kind-based e2e we
# instead want the image scripts/e2e.sh builds locally and `kind load`s into
# the node, so we retag to featuredoc:dev and force IfNotPresent (otherwise the
# node would ignore the loaded image and try to pull from GHCR).
resources:
  - ../k8s

images:
  - name: ghcr.io/dlddu/featuredoc
    newName: featuredoc
    newTag: dev

# Generate the stub-mode secret (the base provides none — see secret.yaml.example):
# a deterministic e2e KEK; GitHub creds stay empty since stub mode never calls
# GitHub. Run mode + base URL + cookie flag are non-secret env, overridden below.
secretGenerator:
  - name: featuredoc-secrets
    literals:
      - FEATUREDOC_KEK=e2e-stub-kek-not-a-real-secret
      - GITHUB_APP_SLUG=featuredoc
      - GITHUB_CLIENT_ID=
      - GITHUB_CLIENT_SECRET=
      - GITHUB_APP_PRIVATE_KEY=

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: featuredoc
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: featuredoc
      spec:
        template:
          spec:
            containers:
              - name: app
                imagePullPolicy: IfNotPresent
                # Stub mode, http cookies, local base URL (merged by env name).
                env:
                  - name: FEATUREDOC_MODE
                    value: "stub"
                  - name: BASE_URL
                    value: "http://localhost:8080"
                  - name: COOKIE_SECURE
                    value: "false"
