apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# e2e overlay. The base (deploy/k8s) targets ghcr.io/dlddu/featuredoc:latest
# with an Always pull policy — correct for production. For kind-based e2e we
# instead want the image scripts/e2e.sh builds locally and `kind load`s into
# the node, so we retag to featuredoc:dev and force IfNotPresent (otherwise the
# node would ignore the loaded image and try to pull from GHCR).
resources:
  - ../k8s

images:
  - name: ghcr.io/dlddu/featuredoc
    newName: featuredoc
    newTag: dev

# Replace the base secret with deterministic stub-mode values: no real GitHub or
# LLM network calls, plain-http cookies, a throwaway KEK (plan: "테스트 더블로 모킹").
secretGenerator:
  - name: featuredoc-secrets
    behavior: replace
    literals:
      - FEATUREDOC_MODE=stub
      - FEATUREDOC_KEK=e2e-stub-kek-not-a-real-secret
      - BASE_URL=http://localhost:8080
      - COOKIE_SECURE=false
      - GITHUB_APP_ID=
      - GITHUB_APP_SLUG=featuredoc
      - GITHUB_CLIENT_ID=
      - GITHUB_CLIENT_SECRET=
      - GITHUB_APP_PRIVATE_KEY=

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: featuredoc
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: featuredoc
      spec:
        template:
          spec:
            containers:
              - name: app
                imagePullPolicy: IfNotPresent
