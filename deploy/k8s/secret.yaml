# Credential material for the FeatureDoc backend.
#
# These are NON-SECRET placeholders for local/kind/CI, where the app runs in
# mock mode (GITHUB_MODE/LLM_MODE=mock) and never contacts GitHub or any LLM
# provider. In staging/production this Secret is created out-of-band from the
# real GitHub App credentials and a freshly generated KEK — it is NOT sourced
# from this file.
apiVersion: v1
kind: Secret
metadata:
  name: featuredoc-credentials
  labels:
    app.kubernetes.io/name: featuredoc
type: Opaque
stringData:
  # 32-byte key-encryption key, base64-encoded (envelope encryption KEK).
  CREDENTIALS_KEK: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
  # GitHub App user-authorization + app credentials (unused in mock mode).
  GITHUB_APP_ID: "000000"
  GITHUB_APP_SLUG: "featuredoc"
  GITHUB_CLIENT_ID: "Iv1.placeholderclientid"
  GITHUB_CLIENT_SECRET: "placeholder-client-secret"
  GITHUB_APP_PRIVATE_KEY: ""
