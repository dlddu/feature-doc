apiVersion: apps/v1
kind: Deployment
metadata:
  name: featuredoc
  labels:
    app.kubernetes.io/name: featuredoc
spec:
  replicas: 1
  strategy:
    # SQLite on a ReadWriteOnce volume: never let two pods mount it at once.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: featuredoc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: featuredoc
    spec:
      containers:
        - name: app
          image: ghcr.io/dlddu/featuredoc:latest
          # imagePullPolicy intentionally omitted: with the :latest tag it
          # defaults to Always, so every pod start pulls the newest image.
          # (The e2e overlay in deploy/e2e/ patches this to IfNotPresent.)
          ports:
            - containerPort: 8080
              name: http
          env:
            # SQLite lives on the mounted PVC; created + migrated on first boot.
            - name: DATABASE_URL
              value: "sqlite:///data/featuredoc.db?mode=rwc"
            # Non-secret runtime config (the e2e overlay patches these).
            - name: FEATUREDOC_MODE
              value: "real"
            - name: BASE_URL
              value: "https://featuredoc.example.com"
            - name: COOKIE_SECURE
              value: "true"
          envFrom:
            # Secrets only: KEK + GitHub App credentials.
            - secretRef:
                name: featuredoc-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            # /hello only answers after migrations apply at startup.
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /hello
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: featuredoc-data
